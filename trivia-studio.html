<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Studio</title>
<style>
  :root{
    --paper:#F7F5EF;
    --card:#FFFFFF;
    --ink:#20262F;
    --sub:#5C6675;
    --line:#E6E1D6;
    --brand:#0E8A6B;
    --brand-dark:#0A6B53;
    --gold:#F4B740;
    --danger:#C0492F;
    --danger-soft:#FBEAE6;
    --radius:18px;
    --shadow:0 10px 30px rgba(30,30,40,.08);
    --shadow-lg:0 24px 60px rgba(30,30,40,.16);
    /* fixed, high-contrast badge colours for answer letters A–F */
    --c0:#D24D3E; --c1:#2C6FB0; --c2:#2E8B57; --c3:#E0A115; --c4:#7E57C2; --c5:#0E8A8A;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Roboto,"Helvetica Neue",Arial,system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-size:18px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;font-size:1rem}
  h1,h2,h3{margin:0;line-height:1.15}

  /* ---------- App shell ---------- */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:var(--card);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;
    padding:14px 22px;
  }
  .logo{display:flex;align-items:center;gap:11px;font-weight:800;font-size:1.25rem;letter-spacing:-.01em}
  .logo .mark{
    width:38px;height:38px;border-radius:11px;flex:none;
    background:linear-gradient(135deg,var(--brand),#15a37f);
    color:#fff;display:grid;place-items:center;font-size:1.2rem;
    box-shadow:0 6px 14px rgba(14,138,107,.35);
  }
  .logo .mark span{transform:translateY(-1px)}
  .spacer{flex:1}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 22px 80px}

  /* ---------- Buttons ---------- */
  .btn{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:11px 17px;border-radius:12px;font-size:1rem;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;transition:transform .05s, box-shadow .15s, background .15s;
  }
  .btn:hover{box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-dark)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#5a3d00}
  .btn.ghost{background:transparent}
  .btn.danger{color:var(--danger);border-color:#ECCAC2;background:var(--danger-soft)}
  .btn.big{padding:15px 26px;font-size:1.15rem;border-radius:14px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .icon-btn{
    width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
    background:var(--card);display:grid;place-items:center;font-size:1.15rem;color:var(--ink);
  }
  .icon-btn:hover{box-shadow:var(--shadow)}

  /* ---------- Library ---------- */
  .page-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:26px;flex-wrap:wrap}
  .page-head h1{font-size:2rem;letter-spacing:-.02em}
  .page-head p{margin:6px 0 0;color:var(--sub)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
  .quiz-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;
  }
  .quiz-card .ribbon{height:8px;border-radius:6px;margin:-6px -6px 12px;background:var(--brand)}
  .quiz-card h3{font-size:1.3rem;letter-spacing:-.01em}
  .quiz-card .meta{color:var(--sub);font-size:.95rem}
  .quiz-card .actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .new-card{
    border:2px dashed var(--line);border-radius:var(--radius);background:transparent;
    display:grid;place-items:center;min-height:150px;color:var(--sub);font-weight:600;font-size:1.05rem;gap:6px;
  }
  .new-card:hover{border-color:var(--brand);color:var(--brand)}
  .empty{
    text-align:center;padding:60px 20px;color:var(--sub);
    border:2px dashed var(--line);border-radius:var(--radius);
  }
  .empty h2{color:var(--ink);margin-bottom:8px}

  /* hero (home) */
  .hero{position:relative;overflow:hidden;border-radius:26px;padding:40px 36px;margin-bottom:30px;color:#fff;
    background:linear-gradient(135deg,#0E8A6B 0%,#13a07e 50%,#1aa6b2 100%);box-shadow:var(--shadow-lg)}
  .hero::after{content:"";position:absolute;right:-50px;top:-50px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.12)}
  .hero::before{content:"";position:absolute;right:90px;bottom:-70px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.08)}
  .hero-badge{display:inline-block;background:rgba(255,255,255,.20);padding:6px 15px;border-radius:30px;font-weight:700;font-size:.92rem;margin-bottom:14px;position:relative}
  .hero h1{font-size:2.6rem;letter-spacing:-.02em;margin:0 0 10px;position:relative}
  .hero p{margin:0 0 24px;font-size:1.18rem;opacity:.96;max-width:560px;position:relative;line-height:1.45}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap;position:relative}
  .hero-import{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.4);padding:15px 24px;border-radius:14px;font-weight:700;font-size:1.05rem}
  .hero-import:hover{background:rgba(255,255,255,.30)}

  /* ---------- Setup ---------- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:22px}
  .panel h2{font-size:1.25rem;margin-bottom:4px}
  .panel .hint{color:var(--sub);font-size:.95rem;margin-bottom:18px}
  .field{margin-bottom:16px}
  .field label{display:block;font-weight:600;margin-bottom:6px;font-size:.98rem}
  .field input[type=text],.field textarea,.field input[type=number]{
    width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:70px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:3px solid rgba(14,138,107,.25);border-color:var(--brand)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.row2{grid-template-columns:1fr}}

  .theme-swatches{display:flex;flex-wrap:wrap;gap:12px}
  .swatch{
    border:2px solid transparent;border-radius:14px;padding:6px;cursor:pointer;width:104px;text-align:center;background:#fff;
  }
  .swatch .prev{height:54px;border-radius:9px;display:flex;align-items:flex-end;padding:6px;gap:4px}
  .swatch .dot{width:14px;height:14px;border-radius:50%}
  .swatch .name{font-size:.85rem;font-weight:600;margin-top:6px;color:var(--sub)}
  .swatch.sel{border-color:var(--brand)}
  .swatch.sel .name{color:var(--ink)}

  .groups-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:6px}
  .group-input{display:flex;align-items:center;gap:8px}
  .group-input .num{width:26px;height:26px;border-radius:7px;background:var(--paper);display:grid;place-items:center;font-weight:700;font-size:.85rem;color:var(--sub);flex:none}
  .group-input input{flex:1;padding:9px 11px;border:1px solid var(--line);border-radius:10px}

  /* question list */
  .q-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);
    border-radius:14px;margin-bottom:10px;background:#fff;
  }
  .q-row .qnum{width:30px;height:30px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;flex:none}
  .q-row .qtext{flex:1;min-width:0}
  .q-row .qtext .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .q-row .qtext .s{color:var(--sub);font-size:.88rem}
  .q-row .ctrls{display:flex;gap:6px;flex:none}
  .pill{font-size:.78rem;background:var(--paper);color:var(--sub);padding:3px 9px;border-radius:20px;font-weight:600}

  /* ---------- Modal / editor ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,22,28,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto}
  .modal{background:var(--card);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:680px;padding:26px}
  .modal h2{font-size:1.4rem;margin-bottom:18px}
  .choice-edit{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .choice-edit .badge{width:34px;height:34px;border-radius:10px;color:#fff;font-weight:800;display:grid;place-items:center;flex:none}
  .choice-edit input[type=text]{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:11px}
  .choice-edit label.correct{display:flex;align-items:center;gap:6px;font-size:.9rem;color:var(--sub);font-weight:600;white-space:nowrap;cursor:pointer}
  .choice-edit input[type=radio]{width:20px;height:20px;accent-color:var(--brand)}
  .img-drop{
    border:2px dashed var(--line);border-radius:12px;padding:14px;text-align:center;color:var(--sub);
    display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
  }
  .img-drop img{max-height:90px;border-radius:8px;border:1px solid var(--line)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap}

  /* ---------- Play stage ---------- */
  #playRoot{
    --bg:#F7F5EF;--panel:#fff;--pink:#20262F;--psub:#5C6675;--pacc:#0E8A6B;--pacc-ink:#fff;
    min-height:100vh;background:var(--bg);color:var(--pink);
  }
  .play-top{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid rgba(0,0,0,.08)}
  .play-top .title{font-weight:800;font-size:1.2rem;letter-spacing:-.01em}
  .play-top .counter{background:rgba(0,0,0,.06);padding:5px 13px;border-radius:30px;font-weight:700;font-size:.95rem}
  .stage{max-width:1000px;margin:0 auto;padding:34px 24px 40px}
  .qcard{background:var(--panel);border-radius:24px;box-shadow:var(--shadow-lg);padding:36px;margin-bottom:24px}
  .qcard .qimg{width:100%;max-height:320px;object-fit:contain;border-radius:16px;margin-bottom:22px;background:rgba(0,0,0,.03)}
  .qcard .qtext{font-size:2rem;font-weight:800;letter-spacing:-.02em;line-height:1.2}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  @media(max-width:760px){.choices{grid-template-columns:1fr}}
  .choice{
    display:flex;align-items:center;gap:16px;background:var(--panel);border:2px solid rgba(0,0,0,.07);
    border-radius:18px;padding:18px 20px;font-size:1.4rem;font-weight:600;box-shadow:var(--shadow);transition:.18s;
  }
  .choice .let{width:46px;height:46px;border-radius:12px;color:#fff;font-weight:800;font-size:1.3rem;display:grid;place-items:center;flex:none}
  .choice.correct{border-color:var(--pacc);background:rgba(14,138,107,.10);box-shadow:0 0 0 4px rgba(14,138,107,.18)}
  .choice.dim{opacity:.5}
  .choice .tick{margin-left:auto;font-size:1.5rem;color:var(--pacc);font-weight:800;opacity:0}
  .choice.correct .tick{opacity:1}

  .recorder{background:var(--panel);border-radius:20px;box-shadow:var(--shadow);padding:22px 24px;margin-bottom:22px}
  .recorder h3{font-size:1.05rem;margin-bottom:4px}
  .recorder .sub{color:var(--psub);font-size:.92rem;margin-bottom:16px}
  .grec{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid rgba(0,0,0,.06);flex-wrap:wrap}
  .grec:first-of-type{border-top:none}
  .grec .gname{font-weight:700;min-width:120px;flex:0 0 auto}
  .grec .opts{display:flex;gap:7px;flex-wrap:wrap}
  .opt{
    min-width:42px;height:42px;padding:0 10px;border-radius:11px;border:2px solid rgba(0,0,0,.12);
    background:#fff;font-weight:800;font-size:1rem;color:var(--pink);display:grid;place-items:center;
  }
  .opt.on{color:#fff;border-color:transparent}
  .grec .res{margin-left:auto;font-weight:800;font-size:.95rem;padding:3px 11px;border-radius:20px}
  .grec .res.right{background:rgba(14,138,107,.14);color:#0A6B53}
  .grec .res.wrong{background:rgba(192,73,47,.12);color:#9c3a26}

  .play-controls{display:flex;align-items:center;gap:12px;max-width:1000px;margin:0 auto;padding:0 24px;flex-wrap:wrap}
  .play-controls .reveal{background:var(--pacc);color:var(--pacc-ink);border:none;padding:16px 30px;border-radius:16px;font-size:1.2rem;font-weight:800;box-shadow:var(--shadow)}
  .play-controls .reveal:hover{filter:brightness(1.05)}

  .winner-banner{
    background:linear-gradient(135deg,var(--pacc),rgba(0,0,0,.15));color:var(--pacc-ink);
    border-radius:18px;padding:18px 22px;margin-bottom:22px;font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .winner-banner .big{font-size:1.5rem}
  .explain{background:var(--panel);border-left:5px solid var(--pacc);border-radius:12px;padding:16px 20px;margin-top:18px}
  .explain img{max-height:240px;max-width:100%;border-radius:10px;margin-top:10px;display:block}

  /* leaderboard overlay */
  .lb-overlay{position:fixed;inset:0;background:rgba(10,12,18,.82);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow:auto}
  .lb{position:relative;width:100%;max-width:680px;border-radius:26px;overflow:hidden;background:#fff;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:lbPop .35s cubic-bezier(.2,.9,.3,1.15)}
  @keyframes lbPop{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
  .lb-head{padding:26px 30px 22px;text-align:center;color:#fff}
  .lb-head .crown{font-size:2.5rem;line-height:1}
  .lb-head h2{font-size:1.8rem;margin:8px 0 0;letter-spacing:-.01em;color:#fff}
  .lb-head .champ{margin-top:8px;font-size:1.1rem;font-weight:700;opacity:.96}
  .lb-body{padding:24px 26px 26px}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;margin:4px 0 24px}
  .pod{flex:1;max-width:175px;display:flex;flex-direction:column;align-items:center}
  .pod .who{font-weight:800;font-size:1.05rem;margin-bottom:10px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#20262F}
  .pod .bar{width:100%;border-radius:14px 14px 0 0;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding-top:12px;color:#fff;box-shadow:inset 0 -7px 0 rgba(0,0,0,.10);transition:height .65s cubic-bezier(.2,.9,.3,1)}
  .pod .bar .medal{font-size:2rem}
  .pod .bar .sc{font-weight:800;font-size:1.35rem;margin-top:2px;text-shadow:0 1px 2px rgba(0,0,0,.25)}
  .lb-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:14px;margin-bottom:9px;background:#F3F5F7;border:1px solid #E6E9ED}
  .lb-row .rank{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:1.3rem;flex:none;background:#E2E6EB;color:#3a4250}
  .lb-row.r1 .rank{background:linear-gradient(135deg,#F7CE55,#E0A008);color:#fff}
  .lb-row.r2 .rank{background:linear-gradient(135deg,#D2D8DF,#9AA5B1);color:#fff}
  .lb-row.r3 .rank{background:linear-gradient(135deg,#ECC194,#CB8E5B);color:#fff}
  .lb-row .nm{font-weight:700;font-size:1.2rem;color:#20262F;flex:0 0 auto;min-width:108px}
  .lb-row .track{flex:1;height:16px;background:#E6E9ED;border-radius:10px;overflow:hidden}
  .lb-row .fill{height:100%;width:0;border-radius:10px;transition:width .7s cubic-bezier(.2,.9,.3,1)}
  .lb-row .pts{font-weight:800;font-size:1.35rem;color:#20262F;min-width:64px;text-align:right}
  .lb-row .pts small{font-weight:600;color:#8A92A0;font-size:.72rem}
  .rule-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:#F3F5F7;border:1px solid #E6E9ED;border-radius:14px;margin-bottom:10px}
  .rule-item .n{width:40px;height:40px;border-radius:50%;color:#fff;font-weight:800;font-size:1.15rem;display:grid;place-items:center;flex:none}
  .rule-item .txt{font-size:1.22rem;font-weight:600;color:#20262F;line-height:1.4;padding-top:5px}

  .confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:80}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-weight:600;z-index:90;box-shadow:var(--shadow-lg);opacity:0;transition:.3s}
  .toast.show{opacity:1}

  .hidden{display:none !important}
  .text-center{text-align:center}
  .mt{margin-top:16px}
  small.note{color:var(--sub)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>

<!-- ===== App chrome (library + setup) ===== -->
<div id="appRoot">
  <div class="topbar">
    <div class="logo"><span class="mark"><span>❖</span></span> Trivia Studio</div>
    <div class="spacer"></div>
    <button class="btn ghost" id="navHome">🏠 Home</button>
  </div>
  <div class="wrap" id="appView"></div>
</div>

<!-- ===== Play mode (separate full-screen root) ===== -->
<div id="playRoot" class="hidden"></div>

<input type="file" id="importFile" accept="application/json" class="hidden">
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   Trivia Studio — single-file offline trivia host tool
   Data persists in this browser (localStorage). Use Export
   to back up or move a quiz to another device.
   ========================================================= */

const STORE_KEY = "triviaStudio.v1";
const LETTERS = ["A","B","C","D","E","F"];
const BADGE = ["var(--c0)","var(--c1)","var(--c2)","var(--c3)","var(--c4)","var(--c5)"];
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---- Visual themes for the play stage (pick one per quiz) ---- */
const THEMES = {
  sunrise:  {name:"Sunrise",  bg:"#FFF4EC", panel:"#FFFFFF", ink:"#3A2A22", sub:"#8a6f60", acc:"#E8743B", accInk:"#fff", swatch:["#FFE0C7","#E8743B","#F4B740"]},
  garden:   {name:"Garden",   bg:"#F0F6EC", panel:"#FFFFFF", ink:"#22311F", sub:"#5d7152", acc:"#3E8E41", accInk:"#fff", swatch:["#DDEFD0","#3E8E41","#A7C957"]},
  ocean:    {name:"Ocean",    bg:"#EDF4FA", panel:"#FFFFFF", ink:"#1B2C3A", sub:"#5b7385", acc:"#1D6FB8", accInk:"#fff", swatch:["#CFE3F2","#1D6FB8","#46B3C9"]},
  lavender: {name:"Lavender", bg:"#F4F0FA", panel:"#FFFFFF", ink:"#2C2438", sub:"#6f6385", acc:"#6A4FB6", accInk:"#fff", swatch:["#E3D9F4","#6A4FB6","#B388EB"]},
  festive:  {name:"Festive",  bg:"#FBF0EC", panel:"#FFFFFF", ink:"#3A1E18", sub:"#8a5c50", acc:"#B3322B", accInk:"#fff", swatch:["#F3D9C8","#B3322B","#E0A115"]},
  midnight: {name:"Night",    bg:"#1C2230", panel:"#283041", ink:"#F2F4F8", sub:"#9aa6bd", acc:"#56C596", accInk:"#0c2018", swatch:["#283041","#56C596","#F4B740"]}

  return seedDB();   // first run, or storage unavailable (e.g. published artifact)
}
function seedDB(){
  return {version:1, quizzes:[ JSON.parse(JSON.stringify(SEED_QUIZ)) ]};
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
  catch(e){ toast("Couldn't save — storage may be full. Try smaller images or Export to back up."); }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function getQuiz(id){ return DB.quizzes.find(q=>q.id===id); }

/* ---------------- Quiz factory ---------------- */
function newGroups(n){
  const arr=[];
  for(let i=0;i<n;i++) arr.push({id:uid(), name:"Group "+(i+1)});
  return arr;
}
function newChoice(t=""){ return {id:uid(), text:t}; }
function newQuestion(){
  const c=[newChoice(""),newChoice(""),newChoice(""),newChoice("")];
  return {id:uid(), text:"", image:null, choices:c, correctId:c[0].id, explanation:"", explanationImage:null};
}
function defaultRules(groupCount, pts){
  return [
    "Everyone plays in their groups.",
    "For each question, your group agrees on one answer together.",
    `Each correct answer earns ${pts} point${pts>1?"s":""}.`,
    "The group with the most points at the end wins!",
    "Most importantly — have fun! 🎉"
  ].join("\n");
}
function newQuiz(){
  return {
    id:uid(), title:"Untitled trivia", subtitle:"",
    theme:"sunrise", pointsPerCorrect:1,
    groups:newGroups(6),
    rules:defaultRules(6,1),
    questions:[],
    session:{answers:{}, revealed:{}, currentIndex:0}
  };
}

/* ---------------- Scoring (derived) ---------------- */
function computeScores(quiz){
  const s={}; quiz.groups.forEach(g=>s[g.id]=0);
  const pts = Number(quiz.pointsPerCorrect)||1;
  quiz.questions.forEach(q=>{
    if(!quiz.session.revealed[q.id]) return;
    const ans = quiz.session.answers[q.id]||{};
    quiz.groups.forEach(g=>{ if(ans[g.id] && ans[g.id]===q.correctId) s[g.id]+=pts; });
  });
  return s;
}
function rankedGroups(quiz){
  const s=computeScores(quiz);
  return quiz.groups
    .map(g=>({...g, score:s[g.id]}))
    .sort((a,b)=> b.score-a.score || a.name.localeCompare(b.name));
}

/* ---------------- Image handling (compress to keep storage small) ---------------- */
function readImageCompressed(file, cb){
  if(!file){ cb(null); return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=1100;
      let {width:w,height:h}=img;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",0.72));
    };
    img.onerror=()=>{ toast("Couldn't read that image."); cb(null); };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

function createAndEdit(){ const q=newQuiz(); DB.quizzes.unshift(q); save(); view={name:"setup",id:q.id}; render(); }

function openPlay(id){
  const q=getQuiz(id);
  const started = Object.keys(q.session.revealed||{}).length>0 || (q.session.currentIndex||0)>0;
  if(q.questions.length===0){ toast("Add some questions first."); view={name:"setup",id}; render(); return; }
  if(started){
    if(confirm("These questions already have a game in progress.\n\nOK = Continue where you left off\nCancel = Start fresh (clears scores & answers)")){
      // continue
    }else{
      q.session={answers:{},revealed:{},currentIndex:0}; save();
    }
  }
  view={name:"play",id}; render();
}

function renderThemes(q){

      </div><div class="name">${th.name}</div>`;
    el.onclick=()=>{ q.theme=key; save(); renderThemes(q); };
    host.appendChild(el);
  });
}
function renderGroupInputs(q){
  const host=byId("groupsList"); host.innerHTML="";
  q.groups.forEach((g,i)=>{

    inp.addEventListener("input",e=>{g.name=e.target.value;save();});
    row.appendChild(inp); host.appendChild(row);

function renderQuestionList(q){
  const host=byId("qList"); host.innerHTML="";
  byId("qCount").textContent=q.questions.length;
  if(q.questions.length===0){
    host.innerHTML=`<p class="hint" style="margin:0">No questions yet — add your first below.</p>`;
    return;
  }
  q.questions.forEach((qq,i)=>{
    const correct=qq.choices.find(c=>c.id===qq.correctId);
    const row=document.createElement("div"); row.className="q-row";
    row.innerHTML=`
      <div class="qnum">${i+1}</div>
      <div class="qtext">
        <div class="t">${esc(qq.text||"(no question text)")}</div>

        <button class="icon-btn" title="Move up" ${i===0?"disabled":""} data-up>↑</button>

        <button class="icon-btn" title="Delete" data-del>🗑</button>
      </div>`;

    row.querySelector("[data-down]").onclick=()=>{ if(i<q.questions.length-1){ [q.questions[i+1],q.questions[i]]=[q.questions[i],q.questions[i+1]]; save(); renderQuestionList(q);} };
    row.querySelector("[data-edit]").onclick=()=>{ editingQuestion=JSON.parse(JSON.stringify(qq)); openQuestionEditor(q,false); };
    row.querySelector("[data-del]").onclick=()=>{ if(confirm("Delete this question?")){ q.questions.splice(i,1); save(); renderQuestionList(q);} };
    host.appendChild(row);

  const fileExp=document.createElement("input"); fileExp.type="file"; fileExp.accept="image/*";

  byId("eText").addEventListener("input",e=>qd.text=e.target.value);

  byId("eImgClear") && (byId("eImgClear").onclick=()=>{qd.image=null; refreshEditorImages();});

  byId("eExpBtn").onclick=()=>fileExp.click();
  fileExp.onchange=()=>readImageCompressed(fileExp.files[0],d=>{ if(d){qd.explanationImage=d; refreshEditorImages();} });
  byId("eExpClear") && (byId("eExpClear").onclick=()=>{qd.explanationImage=null; refreshEditorImages();});

  byId("eAddChoice").onclick=()=>{ if(qd.choices.length<6){ qd.choices.push(newChoice("")); renderChoiceEditors(); } };
  byId("eCancel").onclick=()=>ov.remove();
  byId("eSave").onclick=()=>{
    qd.text=qd.text.trim();
    qd.choices=qd.choices.filter(c=>c.text.trim()!=="" || qd.choices.length<=2); // keep at least the typed ones
    if(qd.choices.length<2){ toast("Add at least 2 choices."); return; }
    if(!qd.choices.find(c=>c.id===qd.correctId)) qd.correctId=qd.choices[0].id;
    if(isNew){ quiz.questions.push(qd); } else {
      const idx=quiz.questions.findIndex(x=>x.id===qd.id);
      if(idx>=0) quiz.questions[idx]=qd;
    }
    save(); ov.remove(); renderQuestionList(quiz);
  };

  renderChoiceEditors();

    const host=byId("eChoices"); host.innerHTML="";
    qd.choices.forEach((c,i)=>{

      row.querySelector("input[type=text]").addEventListener("input",e=>c.text=e.target.value);

      const rm=row.querySelector("button"); if(rm) rm.onclick=()=>{
        qd.choices=qd.choices.filter(x=>x.id!==c.id);
        if(qd.correctId===c.id) qd.correctId=qd.choices[0].id;
        renderChoiceEditors();
      };
      host.appendChild(row);
    });
  }
  function refreshEditorImages(){ ov.remove(); openQuestionEditor(quiz,isNew); }
}

/* ============================================================
   PLAY MODE
   ============================================================ */
function applyTheme(q){
  const th=THEMES[q.theme]||THEMES.sunrise;
  playRoot.style.setProperty("--bg",th.bg);
  playRoot.style.setProperty("--panel",th.panel);
  playRoot.style.setProperty("--pink",th.ink);
  playRoot.style.setProperty("--psub",th.sub);
  playRoot.style.setProperty("--pacc",th.acc);
  playRoot.style.setProperty("--pacc-ink",th.accInk);
}
function renderPlay(){
  const q=getQuiz(view.id);
  if(!q){ view={name:"library"}; return render(); }
  applyTheme(q);
  q.session.currentIndex=Math.min(q.session.currentIndex||0, q.questions.length-1);
  const i=q.session.currentIndex;
  const qq=q.questions[i];
  const revealed=!!q.session.revealed[qq.id];
  const answers=q.session.answers[qq.id]||(q.session.answers[qq.id]={});

  let choicesHtml=qq.choices.map((c,ci)=>{
    const isCorrect=c.id===qq.correctId;
    const cls = revealed ? (isCorrect?"choice correct":"choice dim") : "choice";
    return `<div class="${cls}">
      <div class="let" style="background:${BADGE[ci]}">${LETTERS[ci]}</div>
      <div>${esc(c.text)||"<i>(blank)</i>"}</div>
      <div class="tick">✓</div>
    </div>`;
  }).join("");

  // recorder rows
  let recHtml=q.groups.map(g=>{
    const sel=answers[g.id];
    const opts=qq.choices.map((c,ci)=>{
      const on=sel===c.id;
      return `<button class="opt ${on?"on":""}" style="${on?`background:${BADGE[ci]}`:""}" data-group="${g.id}" data-choice="${c.id}">${LETTERS[ci]}</button>`;
    }).join("");
    let res="";
    if(revealed && sel){ res = sel===qq.correctId ? `<span class="res right">✓ correct</span>` : `<span class="res wrong">✗</span>`; }
    else if(revealed && !sel){ res=`<span class="res wrong">no answer</span>`; }
    return `<div class="grec"><span class="gname">${esc(g.name)}</span><div class="opts">${opts}</div>${res}</div>`;
  }).join("");

  // winner banner
  let bannerHtml="";
  if(revealed){
    const winners=q.groups.filter(g=>answers[g.id]===qq.correctId);
    const correctChoice=qq.choices.find(c=>c.id===qq.correctId);
    bannerHtml=`<div class="winner-banner">
      <span class="big">🎉</span>
      <div><div style="font-size:.9rem;opacity:.85">Correct answer</div>
      <div style="font-size:1.3rem">${esc(correctChoice?correctChoice.text:"")}</div></div>
      <div class="spacer" style="flex:1"></div>
      <div style="text-align:right">
        <div style="font-size:.9rem;opacity:.85">Got it right</div>
        <div>${winners.length? winners.map(w=>esc(w.name)).join(", ") : "Nobody this round"}</div>
      </div>
    </div>`;
  }

  let explainHtml="";
  if(revealed && (qq.explanation || qq.explanationImage)){
    explainHtml=`<div class="explain">
      ${qq.explanation?`<div>${esc(qq.explanation)}</div>`:""}
      ${qq.explanationImage?`<img src="${qq.explanationImage}">`:""}
    </div>`;
  }

  playRoot.innerHTML=`
    <div class="play-top">
      <button class="icon-btn" id="pExit" title="Back to home">✕</button>
      <div class="title">${esc(q.title)}</div>
      <div class="spacer" style="flex:1"></div>
      <button class="icon-btn" id="pSound" title="Sound effects on/off">${soundOn?"🔔":"🔕"}</button>
      <button class="icon-btn" id="pSpeak" title="Read question aloud">🗣️</button>
      <button class="btn" id="pRules">📋 Rules</button>
      <button class="btn" id="pBoard">🏆 Leaderboard</button>
      <span class="counter">${i+1} / ${q.questions.length}</span>
    </div>

    <div class="stage">
      ${bannerHtml}
      <div class="qcard">
        ${qq.image?`<img class="qimg" src="${qq.image}">`:""}
        <div class="qtext">${esc(qq.text)||"<i>(no question text)</i>"}</div>
        <div class="choices">${choicesHtml}</div>
        ${explainHtml}
      </div>

      <div class="recorder">
        <h3>Record each group's answer</h3>
        <div class="sub">Tap the letter each group chose. ${revealed?"Answers are revealed — you can still adjust if needed.":"The correct answer stays hidden until you press Reveal."}</div>
        ${recHtml}
      </div>
    </div>

    <div class="play-controls">
      <button class="btn big" id="pPrev" ${i===0?"disabled":""}>← Previous</button>
      ${revealed
        ? `<button class="btn big" id="pHide">Hide answer</button>`
        : `<button class="reveal" id="pReveal">Reveal answer ✓</button>`}
      <div class="spacer" style="flex:1"></div>
      ${i<q.questions.length-1
        ? `<button class="btn primary big" id="pNext">Next →</button>`
        : `<button class="btn gold big" id="pFinish">Finish 🏁</button>`}
    </div>
  `;

  // bindings
  byId("pExit").onclick=()=>{ view={name:"library"}; render(); };
  byId("pBoard").onclick=()=>showLeaderboard(q,false);
  byId("pRules").onclick=()=>showRules(q);
  byId("pSpeak").onclick=()=>speakQuestion(qq);
  byId("pSound").onclick=()=>{ soundOn=!soundOn; DB.sound=soundOn; save(); byId("pSound").textContent=soundOn?"🔔":"🔕"; if(soundOn) sfx("select"); };
  byId("pPrev") && (byId("pPrev").onclick=()=>{ q.session.currentIndex=Math.max(0,i-1); save(); renderPlay(); });
  byId("pNext") && (byId("pNext").onclick=()=>{ q.session.currentIndex=Math.min(q.questions.length-1,i+1); save(); renderPlay(); });
  byId("pFinish") && (byId("pFinish").onclick=()=>showLeaderboard(q,true));
  byId("pReveal") && (byId("pReveal").onclick=()=>{
    q.session.revealed[qq.id]=true; save();
    const anyRight=q.groups.some(g=>(q.session.answers[qq.id]||{})[g.id]===qq.correctId);
    renderPlay();
    sfx(anyRight?"correct":"reveal");
    if(!reduceMotion) confetti();
  });
  byId("pHide") && (byId("pHide").onclick=()=>{ delete q.session.revealed[qq.id]; save(); renderPlay(); });

  playRoot.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>{
      const gid=b.dataset.group, cid=b.dataset.choice;
      if(answers[gid]===cid) delete answers[gid]; else answers[gid]=cid;
      save(); sfx("select"); renderPlay();
    };
  });
}

function speakQuestion(qq){
  if(!("speechSynthesis" in window)){ toast("Read-aloud isn't supported in this browser."); return; }
  speechSynthesis.cancel();
  let text=qq.text+". ";
  qq.choices.forEach((c,ci)=>{ if(c.text.trim()) text+=LETTERS[ci]+": "+c.text+". "; });
  const u=new SpeechSynthesisUtterance(text); u.rate=0.92; u.pitch=1;
  speechSynthesis.speak(u);
}

/* ---------- Leaderboard overlay ---------- */
function showLeaderboard(q, isFinal){
  const th=THEMES[q.theme]||THEMES.sunrise;
  const ranked=rankedGroups(q);
  const maxScore=Math.max(1, ...ranked.map(g=>g.score));
  const allZero=ranked.every(g=>g.score===0);
  const medals=["🥇","🥈","🥉"];
  const leader=ranked[0];

  let champ;
  if(isFinal) champ = allZero ? "No points scored this round" : `👑 ${esc(leader.name)} wins!`;
  else        champ = allZero ? "No points yet — game on!"     : `${esc(leader.name)} is in the lead`;

  // Podium for the top three (final results only)
  let podiumHtml="";
  if(isFinal){
    const order=[1,0,2]; // left→right: 2nd, 1st, 3rd
    const grads=["linear-gradient(180deg,#F7CE55,#E0A008)","linear-gradient(180deg,#D2D8DF,#9AA5B1)","linear-gradient(180deg,#ECC194,#CB8E5B)"];
    const hts=[176,132,98];
    podiumHtml=`<div class="podium">`+order.map(idx=>{
      const g=ranked[idx]; if(!g) return "";
      return `<div class="pod">
        <div class="who">${esc(g.name)}</div>
        <div class="bar" style="background:${grads[idx]};height:0" data-h="${hts[idx]}">
          <div class="medal">${medals[idx]}</div><div class="sc">${g.score}</div>
        </div>
      </div>`;
    }).join("")+`</div>`;
  }

  // Ranked list (final: 4th onward; peek: everyone) with score bars
  const start = isFinal ? 3 : 0;
  const listHtml = ranked.slice(start).map((g,k)=>{
    const rank=start+k+1;
    const rcls = rank<=3?`r${rank}`:"";
    const w = Math.round((g.score/maxScore)*100);
    const badge = rank<=3?medals[rank-1]:rank;
    return `<div class="lb-row ${rcls}">
      <div class="rank">${badge}</div>
      <div class="nm">${esc(g.name)}</div>
      <div class="track"><div class="fill" data-w="${w}" style="background:${th.acc}"></div></div>
      <div class="pts">${g.score}<small> pts</small></div>
    </div>`;
  }).join("");

  const ov=document.createElement("div"); ov.className="lb-overlay";
  ov.innerHTML=`<div class="lb">
    <div class="lb-head" style="background:linear-gradient(135deg, ${th.acc}, rgba(0,0,0,.30))">
      <div class="crown">${isFinal?"🏆":"📊"}</div>
      <h2>${isFinal?"Final results":"Leaderboard"}</h2>
      <div class="champ">${champ}</div>
    </div>
    <div class="lb-body">
      ${podiumHtml}
      ${listHtml || '<p class="text-center" style="color:#8A92A0;margin:0">Top 3 shown above — well played!</p>'}
      <div class="modal-actions" style="justify-content:center;margin-top:22px">
        ${isFinal?`<button class="btn" id="lbReset">Reset for next week</button>`:""}
        <button class="btn primary big" id="lbClose">${isFinal?"Done":"Back to game"}</button>
      </div>
    </div>
  </div>`;
  playRoot.appendChild(ov);

  // animate score bars + podium rising
  requestAnimationFrame(()=>{
    ov.querySelectorAll(".fill").forEach(f=>f.style.width=f.dataset.w+"%");
    ov.querySelectorAll(".pod .bar").forEach(b=>b.style.height=b.dataset.h+"px");
  });

  byId("lbClose").onclick=()=>ov.remove();
  if(isFinal && !reduceMotion) confetti(2200);
  if(isFinal) sfx("win");
  byId("lbReset") && (byId("lbReset").onclick=()=>{
    if(confirm("Clear all scores and answers for a fresh session? (Your questions stay.)")){
      q.session={answers:{},revealed:{},currentIndex:0}; save(); ov.remove();
      view={name:"library"}; render(); toast("Session reset — ready for next week.");
    }
  });
}

/* ---------- Rules overlay ---------- */
function showRules(q){
  const th=THEMES[q.theme]||THEMES.sunrise;
  const lines=(q.rules||"").split("\n").map(s=>s.trim()).filter(Boolean);
  const items=lines.length?lines:["Play in your groups.","Pick one answer per question.","Each correct answer earns a point.","Most points at the end wins!"];
  const rows=items.map((t,i)=>`<div class="rule-item"><div class="n" style="background:${th.acc}">${i+1}</div><div class="txt">${esc(t)}</div></div>`).join("");
  const ov=document.createElement("div"); ov.className="lb-overlay";
  ov.innerHTML=`<div class="lb">
    <div class="lb-head" style="background:linear-gradient(135deg, ${th.acc}, rgba(0,0,0,.30))">
      <div class="crown">📋</div>
      <h2>How to play</h2>
      ${q.title?`<div class="champ">${esc(q.title)}</div>`:""}
    </div>
    <div class="lb-body">
      ${rows}
      <div class="modal-actions" style="justify-content:center;margin-top:20px">
        <button class="btn primary big" id="rulesClose">Let's play! ▶</button>
      </div>
    </div>
  </div>`;
  playRoot.appendChild(ov);
  byId("rulesClose").onclick=()=>ov.remove();
}

/* ============================================================
   Export / Import
   ============================================================ */
function exportQuiz(id){
  const q=getQuiz(id); if(!q) return;
  const clone=JSON.parse(JSON.stringify(q));
  clone.session={answers:{},revealed:{},currentIndex:0}; // share without scores
  const blob=new Blob([JSON.stringify(clone,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(q.title||"trivia").replace(/[^\w\- ]+/g,"").trim().replace(/\s+/g,"-").toLowerCase()+".trivia.json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Exported. Keep this file to back up or move to another device.");
}
const importInput=document.getElementById("importFile");
function triggerImport(){ importInput.value=""; importInput.click(); }
importInput.addEventListener("change",()=>{
  const f=importInput.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.questions||!data.groups) throw new Error("bad");
      data.id=uid();
      data.session={answers:{},revealed:{},currentIndex:0};
      if(!THEMES[data.theme]) data.theme="sunrise";
      DB.quizzes.unshift(data); save(); render();
      toast("Imported!");
    }catch(e){ toast("That file didn't look like a Trivia Studio set."); }
  };
  r.readAsText(f);
});

/* ============================================================
   Sound effects — generated with Web Audio (no files, offline)
   ============================================================ */
let audioCtx=null;
function ac(){
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(audioCtx && audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq,start,dur,type,gain){
  const ctx=ac(); if(!ctx) return;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type||"triangle"; o.frequency.value=freq;
  o.connect(g); g.connect(ctx.destination);
  const t=ctx.currentTime+start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain||0.18,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.03);
}
function sfx(name){
  if(!soundOn) return;
  try{
    if(name==="reveal"){ tone(587,0,0.16,"triangle",.2); tone(880,0.10,0.34,"triangle",.2); }            // pleasant ding-up
    else if(name==="correct"){ tone(659,0,0.14,"triangle",.2); tone(988,0.10,0.16,"triangle",.2); tone(1319,0.22,0.42,"triangle",.22); } // bright ta-da
    else if(name==="win"){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,i*0.13,0.5,"triangle",.2)); }     // victory arpeggio
    else if(name==="select"){ tone(523,0,0.06,"sine",.09); }                                              // soft tick
  }catch(e){}
}

/* ============================================================
   Confetti (vanilla, lightweight)
   ============================================================ */
function confetti(duration=1400){
  const cv=document.createElement("canvas"); cv.className="confetti-canvas";
  cv.width=innerWidth; cv.height=innerHeight; document.body.appendChild(cv);
  const ctx=cv.getContext("2d");
  const colors=["#E8743B","#F4B740","#3E8E41","#1D6FB8","#B3322B","#6A4FB6"];
  const N=140, parts=[];
  for(let i=0;i<N;i++){
    parts.push({x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.3,
      r:6+Math.random()*8, c:colors[i%colors.length], vy:2+Math.random()*4,
      vx:-2+Math.random()*4, rot:Math.random()*6.28, vr:-.2+Math.random()*.4});
  }
  const t0=performance.now();
  (function frame(t){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.03;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); ctx.restore();
    });
    if(t-t0<duration) requestAnimationFrame(frame);
    else cv.remove();
  })(t0);
}

/* ============================================================
   Helpers
   ============================================================ */
function byId(id){ return document.getElementById(id); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escAttr(s){ return esc(s).replace(/"/g,"&quot;"); }
let toastTimer=null;
function toast(msg){
  const t=byId("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),3200);
}
document.getElementById("navHome").onclick=()=>{ view={name:"library"}; render(); };

window.addEventListener("resize",()=>{}); // reserved
render();
